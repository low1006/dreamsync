name: dreamsync
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  health: ^12.0.1
  url_launcher: ^6.2.5
  http: ^1.2.0
  permission_handler: ^11.3.0
  android_alarm_manager_plus: ^4.0.0
  flutter_local_notifications: ^17.0.0
  timezone:  ^0.9.0
  flutter_timezone: ^3.0.1
  audioplayers: ^6.0.0
  do_not_disturb: ^1.0.1
  flutter_markdown: ^0.7.2
  google_generative_ai: ^0.4.6
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  provider: ^6.1.2
  intl: ^0.19.0
  fl_chart: ^1.1.1
  app_usage: ^4.0.1
  flutter_typeahead: ^5.2.0
  # For local database storage
  sqflite: ^2.3.0
  path_provider: ^2.1.2

  # For simple key-value caching
  shared_preferences: ^2.2.2

  # To detect internet connection status
  connectivity_plus: ^5.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/